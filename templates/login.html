<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Passenger Login</h2>
        <form action="/login" method="post" style="box-shadow: none; padding: 0; background: transparent; border: none; max-width: none; margin: 0;">
            <label for="passenger-id">Passenger ID:</label>
            <input type="number" id="passenger-id" name="passenger_id" required>
            <button type="submit" class="submit-btn">Login</button>
        </form>
        <a href="/" class="back-link">Back to Home</a>
    </div>
</body>
</html>
